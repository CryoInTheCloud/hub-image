# Runs conda-lock against environment.yml for reproducible environments
name: Conda Lock

on:
  repository_dispatch:
    types:
      - condalock-command

permissions: {}

jobs:
  condalock:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for git push
    environment:
      name: slash-ops
      deployment: false

    steps:
      # Checkout the pull request branch
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.client_payload.github.ref }}

      # Install conda-lock library with Micromamba
      - name: Install conda-lock with Micromamba
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-name: conda-lock-env
          create-args: conda-lock
          init-shell: none
          cache-downloads-key: micromamba-downloads

      # Generate unified 'conda-lock.yml' and platform-specific lockfiles
      - name: Run conda-lock
        shell: micromamba-shell {0}
        run: >
          conda-lock lock
          --kind lock
          --kind explicit
          --file environment.yml
          --without-cuda
          --platform linux-64

      # Commit the change to the PR branch if any changes
      - name: Commit condalock files to PR
        run: |
          if [[ $(git ls-files --modified) ]]; then
            git config --global user.name 'actions-bot'
            git config --global user.email '58130806+actions-bot@users.noreply.github.com'
            git commit --all --message "[condalock-command] autogenerated conda-lock files"
            git push  
          fi

      # Generate token from CryoInTheCloud bot
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Add an emoji reaction to comment to indicate the script completed successfully
      - name: Add reaction
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          reactions: hooray

  call:
    needs: condalock
    permissions:
      packages: write  # needed to upload and publish cache to GitHub Packages
    uses: ./.github/workflows/build.yaml
    with:
      ref: ${{ github.event.client_payload.github.ref }}
