name: Test or publish container image

on:
  workflow_call:

permissions: {}  # prevent excessive permissions on workflow level

jobs:
  build:
    env:
      PACKAGE: cryo-hub-image
      REGISTRY: quay.io
    runs-on: ubuntu-latest
    steps:

      - name: Checkout files in repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Image metadata
        id: image
        uses: docker/metadata-action@v6
        env:
            DOCKER_METADATA_SHORT_SHA_LENGTH: 12
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PACKAGE }}
          tags: |
            type=sha,prefix=

      - name: Cache metadata
        id: cache
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.PACKAGE }}-cache
          tags: |
            type=raw,value=latest

      - name: Authenticate with distribution registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Authenticate with cache registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Install repo2docker
        run: pip install git+https://github.com/jupyterhub/repo2docker.git@6b59fafc364a549d1709866b0c559d097a052010

      - name: Run repo2docker
        env:
          PUSH_QUESTION: ${{ github.event_name == 'push' && '--push' || '--no-push' }}
          STEPS_CACHE_OUTPUTS_TAGS: ${{ steps.cache.outputs.tags }}
          STEPS_IMAGE_OUTPUTS_TAGS: ${{ steps.image.outputs.tags }}
        run: >
          jupyter-repo2docker
          $PUSH_QUESTION
          --no-run
          --user-id 1000
          --user-name jovyan
          --target-repo-dir /srv/repo
          --appendix "$(< appendix)"
          --image-name ${STEPS_IMAGE_OUTPUTS_TAGS}
          --DockerEngine.extra_buildx_build_args=--cache-from="type=registry,ref=${STEPS_CACHE_OUTPUTS_TAGS}"
          --DockerEngine.extra_buildx_build_args=--cache-to="type=registry,ref=${STEPS_CACHE_OUTPUTS_TAGS},mode=max"
          .

      # Lets us monitor disks getting full as images get bigger over time
      - name: Show how much disk space is left
        run: df -h
