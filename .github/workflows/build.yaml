name: Build and push container image

on:
  push:
    branches:
      - main
    paths: &paths
      - "apt.txt"
      - "conda-linux-64.lock"
      - "environment.yml"
      - "start"
      - "postBuild"
      # Trigger rebuilds if the build process changes
      - ".github/workflows/build.yaml"
  pull_request:
    paths: *paths

permissions: {}

jobs:
  build-and-push:
    env:
      PACKAGE: cryo-hub-image
      REGISTRY: quay.io
    runs-on: ubuntu-latest
    steps:

    - name: Checkout files in repo
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Repository metadata
      uses: docker/metadata-action@v6
      env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 12
      with:
        images: |
          ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PACKAGE }}
        tags: |
          type=sha,prefix=

    # - name: Authenticate with distribution registry
    #   uses: docker/login-action@v4
    #   with:
    #     registry: ${{ env.REGISTRY }}
    #     username: ${{ secrets.QUAY_USERNAME }}
    #     password: ${{ secrets.QUAY_PASSWORD }}

    - name: Authenticate with cache registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup docker buildx
      uses: docker/setup-buildx-action@v4

    - name: Setup python
      uses: actions/setup-python@v6
      with:
        cache: pip
        pip-install: jupyter-repo2docker

    - name: Run repo2docker
      env:
        PUSH_QUESTION: ${{ github.event_name == 'push' && '--push' || '--no-push' }}
        CACHE: ghcr.io/${{ github.repository_owner }}/${{ env.PACKAGE }}-cache:latest
      run: >
        jupyter-repo2docker
        $PUSH_QUESTION
        --no-run
        --user-id 1000
        --user-name jovyan
        --target-repo-dir /srv/repo
        --appendix "$(< appendix)"
        --image-name "$DOCKER_METADATA_OUTPUT_TAGS"
        --DockerEngine.extra_buildx_build_args=--cache-from="type=registry,ref=$CACHE"
        --DockerEngine.extra_buildx_build_args=--cache-to="type=registry,ref=$CACHE,mode=max"
        .

    # Lets us monitor disks getting full as images get bigger over time
    - name: Show how much disk space is left
      run: df -h
