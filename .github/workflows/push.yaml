name: Publish container image

on:
  push:
    branches:
      - main
    paths:
      - "appendix"
      - "apt.txt"
      - "conda-lock.yml"
      - "environment.yml"
      - "start"
      - "postBuild"
      - ".github/workflows/build.yaml"  # rebuild if the build process changes
      - ".github/workflows/push.yaml"  # rebuild if this workflow changes

permissions: {}  # prevent excessive permissions on workflow level

jobs:
  call:
    uses: ./.github/workflows/build.yaml
    environment: container
    permissions:
      packages: write  # needed to upload and publish cache to GitHub Packages
    secrets:
      username: ${{ secrets.QUAY_USERNAME }}
      password: ${{ secrets.QUAY_PASSWORD }}
