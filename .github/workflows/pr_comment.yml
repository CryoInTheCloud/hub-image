# Respond to dependabot Pull Request updating environment.yml with /condalock command!
name: Pull Request comment

on:
  pull_request:
    types: [opened, reopened]
    paths:
      - environment.yml

permissions: {}

jobs:
  CallCondaLock:
    runs-on: ubuntu-slim
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == github.event.pull_request.head.repo.full_name
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Generate token from CryoInTheCloud bot
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Add Condalock Comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{github.event.number}}
          body: |
            /condalock
            Automatically locking new conda environment, building, and testing images...
