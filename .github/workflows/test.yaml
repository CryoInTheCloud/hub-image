name: Test building container image

on:
  pull_request:
    paths:
      - "appendix"
      - "apt.txt"
      - "conda-lock.yml"
      - "environment.yml"
      - "start"
      - "postBuild"
      - ".github/workflows/build.yaml"  # rebuild if the build process changes
      - ".github/workflows/test.yaml"  # rebuild if this workflow changes

permissions: {}  # prevent excessive permissions on workflow level

jobs:
  call:
    uses: ./.github/workflows/build.yaml
    permissions:
      packages: write  # needed to upload and publish cache to GitHub Packages
